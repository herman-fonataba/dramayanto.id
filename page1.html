<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        
        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 2rem;
            border: 1px solid #334155;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #3b82f6;
        }
        
        .header h1 {
            background: linear-gradient(120deg, #fbbf24, #f59e0b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-size: 1.8rem;
        }
        
        .user-info {
            background: #1e293b;
            padding: 8px 20px;
            border-radius: 40px;
            color: #facc15;
        }
        
        .logout-btn {
            background: #ef4444;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            margin-left: 1rem;
            transition: 0.2s;
        }
        
        .logout-btn:hover {
            background: #dc2626;
            transform: scale(0.95);
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }
        
        .card {
            background: #1e293b;
            padding: 1.5rem;
            border-radius: 1.2rem;
            border: 1px solid #334155;
        }
        
        .card h3 {
            color: #94a3b8;
            font-size: 0.85rem;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }
        
        .value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #facc15;
            margin: 0.5rem 0;
        }
        
        .trend {
            color: #4ade80;
            font-size: 0.85rem;
        }
        
        .welcome {
            background: #0f172a;
            padding: 1.2rem;
            border-radius: 1rem;
            margin-top: 1.5rem;
            text-align: center;
            color: #cbd5e1;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1>🏆 EXECUTIVE DASHBOARD</h1>
            <div>
                <span class="user-info" id="userName">Loading...</span>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
        
        <div class="grid">
            <div class="card">
                <h3>📊 TOTAL REVENUE</h3>
                <div class="value">Rp 12.8B</div>
                <div class="trend">↑ 23% vs last month</div>
            </div>
            <div class="card">
                <h3>👥 ACTIVE USERS</h3>
                <div class="value">128,450</div>
                <div class="trend">↑ 12% growth</div>
            </div>
            <div class="card">
                <h3>📦 ORDERS COMPLETED</h3>
                <div class="value">3,842</div>
                <div class="trend">This month</div>
            </div>
            <div class="card">
                <h3>⭐ CUSTOMER SATISFACTION</h3>
                <div class="value">4.8/5</div>
                <div class="trend">+0.3 points</div>
            </div>
        </div>
        
        <div class="welcome" id="welcomeMsg"></div>
    </div>
    
    <script>
        // Cek autentikasi saat load
        const session = sessionStorage.getItem('dashboardAuth');
        const userData = session ? JSON.parse(session) : null;
        
        if (!userData || userData.dashboard !== 'direktur_utama') {
            window.location.href = 'index.html';
        }
        
        document.getElementById('userName').textContent = `👤 ${userData.displayName}`;
        document.getElementById('welcomeMsg').innerHTML = `✨ Selamat datang, ${userData.displayName}. Akses penuh ke data eksekutif tersedia.`;
        
        function logout() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>

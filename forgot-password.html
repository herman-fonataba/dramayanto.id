<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phoenix Taekwondo - Lupa Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://herman-fonataba.github.io/dramayanto.id/css/style.css">
    <style>
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: #1a0500; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #ff5500, #ff9933); border-radius: 10px; }
        body, a, button, input { cursor: url('https://phoenix-taekwondo-family.vercel.app/Foto/cursor.svg') 8 8, pointer; }
    </style>
</head>
<body>
    <div class="dark-overlay"></div>
    <div class="phoenix-wrapper" style="max-width: 500px;">
        <div class="phoenix-header">
            <div class="logo-container">
                <div class="circle-logo-wrapper" style="width: 120px; height: 120px;">
                    <div class="circle-logo">
                        <img src="https://phoenix-taekwondo-family.vercel.app/Foto/PHOENIX%20TAEKWONDO%20FAMILY.svg" alt="Logo" style="width:100%;height:100%;object-fit:contain;" onerror="this.src='https://via.placeholder.com/120?text=PTF'">
                    </div>
                </div>
            </div>
        </div>
        <div class="page-title"><i class="fas fa-key"></i> LUPA PASSWORD <i class="fas fa-question-circle"></i></div>
        <div id="resetMessage" class="login-error" style="display: none;"></div>
        <div id="resetSuccess" class="login-success" style="display: none;"></div>
        <form id="forgotForm">
            <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="resetEmail" placeholder="Email Address" required></div>
            <div class="input-group"><i class="fas fa-user"></i><input type="text" id="fullName" placeholder="Nama Lengkap" required></div>
            <div class="ember-line"><span></span><span></span><span></span><span></span><span></span></div>
            <button type="submit" class="phoenix-btn small"><i class="fas fa-paper-plane"></i> KIRIM LINK RESET</button>
            <div class="phoenix-extras center" style="margin-top: 20px;"><a href="index.html" class="back-to-login"><i class="fas fa-arrow-left"></i> Kembali ke Login</a></div>
        </form>
        <div class="extra-content"><p><i class="fas fa-envelope"></i> Link reset akan dikirim ke email Anda</p><p style="font-size: 12px; margin-top: 10px;">Demo: Gunakan email yang terdaftar di sistem</p></div>
    </div>
    <script src="https://herman-fonataba.github.io/dramayanto.id/js/main.js"></script>
</body>
</html>

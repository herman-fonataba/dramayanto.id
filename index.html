<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Multi-Dashboard Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .login-card h1 {
            font-size: 2rem;
            background: linear-gradient(120deg, #e0e7ff, #a5f3fc);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .subhead {
            color: #94a3b8;
            margin-bottom: 2rem;
            font-size: 0.85rem;
            border-left: 3px solid #3b82f6;
            padding-left: 12px;
        }

        .input-group {
            margin-bottom: 1.25rem;
        }

        .input-group label {
            display: block;
            color: #cbd5e1;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #334155;
            border-radius: 16px;
            font-size: 0.95rem;
            color: #f1f5f9;
            outline: none;
            transition: all 0.2s;
        }

        .input-group input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(95deg, #2563eb, #1e40af);
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            margin-top: 8px;
            transition: transform 0.1s;
        }

        .login-btn:hover {
            transform: scale(0.98);
            background: linear-gradient(95deg, #3b82f6, #2563eb);
        }

        .message {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.8rem;
            padding: 8px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            color: #facc15;
        }

        .info {
            margin-top: 1rem;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            font-size: 0.7rem;
            color: #64748b;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1>🔐 Multi-Dashboard</h1>
            <div class="subhead">4 dashboard berbeda · Autentikasi via Apps Script</div>
            
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Masukkan username" autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Masukkan password">
            </div>
            
            <button class="login-btn" id="loginBtn">Login →</button>
            <div class="message" id="message"></div>
            <div class="info">
                ⚡ Credentials diverifikasi oleh Google Apps Script<br>
                Username & password tidak tersimpan di kode ini
            </div>
        </div>
    </div>

    <script>
        // 🔧 GANTI DENGAN URL APPS SCRIPT ANDA
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxSiycgafc698ucQj7dZ5x6smlu2JNjgJEq3oLBbkgrzGm2ea6B8SzLOGwqH-Zfml0i/exec";
        
        document.getElementById('loginBtn').addEventListener('click', login);
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
        
        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            
            if (!username || !password) {
                messageDiv.innerHTML = '❌ Username dan password harus diisi';
                return;
            }
            
            messageDiv.innerHTML = '⏳ Memverifikasi...';
            messageDiv.style.color = '#facc15';
            
            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // Redirect ke dashboard yang sesuai
                    const dashboardUrl = result.dashboardUrl;
                    window.location.href = dashboardUrl;
                } else {
                    messageDiv.innerHTML = `❌ ${result.error || 'Login gagal'}`;
                    messageDiv.style.color = '#f87171';
                }
            } catch (error) {
                console.error('Error:', error);
                messageDiv.innerHTML = '❌ Gagal terhubung ke server autentikasi';
                messageDiv.style.color = '#f87171';
            }
        }
    </script>
</body>
</html>
